groups:
  - name: event-platform-alerts
    interval: 30s
    rules:

      # ── Service availability ─────────────────────────────────────────────
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      # ── Kafka producer ───────────────────────────────────────────────────
      - alert: HighPublishFailureRate
        expr: |
          rate(kafka_events_failed_total[5m]) /
          (rate(kafka_events_published_total[5m]) + rate(kafka_events_failed_total[5m])) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka publish failure rate"
          description: "More than 5% of events are failing to publish to Kafka."

      - alert: KafkaPublishLatencyHigh
        expr: histogram_quantile(0.99, rate(kafka_publish_duration_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Kafka publish p99 latency > 1s"
          description: "Kafka producer p99 publish latency is {{ $value }}s."

      # ── Kafka Streams processor ──────────────────────────────────────────
      - alert: StreamsConsumerLagHigh
        expr: kafka_consumer_group_lag > 10000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Kafka Streams consumer lag is high"
          description: "Consumer group lag is {{ $value }} messages — streams may be falling behind."

      # ── Event consumer ───────────────────────────────────────────────────
      - alert: HighConsumerErrorRate
        expr: rate(consumer_errors_total[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Event consumer error rate elevated"
          description: "Consumer is processing {{ $value }} errors/sec."

      - alert: AlertVolumeSpike
        expr: rate(consumer_alerts_consumed_total[5m]) > 10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High alert volume — possible event anomaly"
          description: "Alert consumption rate is {{ $value }}/sec."

      # ── JVM health ───────────────────────────────────────────────────────
      - alert: JvmHeapUsageHigh
        expr: |
          jvm_memory_used_bytes{area="heap"} /
          jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage > 85% on {{ $labels.instance }}"
          description: "Heap usage is at {{ $value | humanizePercentage }}."

      - alert: JvmGcPauseHigh
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High GC pause time on {{ $labels.instance }}"
          description: "GC pause rate is {{ $value }}s/s."
