global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: event-platform
    env:     local

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: event-producer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-producer:8081"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: event-producer

  - job_name: event-processor
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-processor:8082"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: event-processor

  - job_name: event-consumer
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["event-consumer:8083"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: event-consumer


  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: kafka-broker
