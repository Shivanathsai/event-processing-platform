global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@eventplatform.com'

route:
  group_by: ['alertname', 'instance']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 12h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 10s

receivers:
  - name: default
    # Add Slack/PagerDuty webhook here for production
    # webhook_configs:
    #   - url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

  - name: critical-alerts
    # webhook_configs:
    #   - url: 'https://your-pagerduty-url'

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
