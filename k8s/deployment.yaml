---
apiVersion: v1
kind: Namespace
metadata:
  name: event-platform
  labels:
    app.kubernetes.io/part-of: event-platform

---
# ── ConfigMap ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: event-platform-config
  namespace: event-platform
data:
  KAFKA_BOOTSTRAP_SERVERS:    "kafka-service:9092"
  WINDOW_DURATION_SECONDS:    "60"
  ALERT_THRESHOLD:            "100"
  KAFKA_STREAMS_APP_ID:       "event-processor"
  SPRING_PROFILES_ACTIVE:     "prod"

---
# ── event-producer Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-producer
  namespace: event-platform
  labels:
    app: event-producer
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-producer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: event-producer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8081"
    spec:
      containers:
        - name: event-producer
          image: YOUR_ECR/event-producer:latest
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: event-platform-config
          livenessProbe:
            httpGet: { path: /actuator/health/liveness,  port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }

---
apiVersion: v1
kind: Service
metadata:
  name: event-producer-service
  namespace: event-platform
spec:
  selector:
    app: event-producer
  ports:
    - port: 80
      targetPort: 8081
  type: ClusterIP

---
# ── event-processor Deployment ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-processor
  namespace: event-platform
spec:
  replicas: 2  # Kafka Streams handles partition assignment automatically
  selector:
    matchLabels:
      app: event-processor
  template:
    metadata:
      labels:
        app: event-processor
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8082"
    spec:
      containers:
        - name: event-processor
          image: YOUR_ECR/event-processor:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: event-platform-config
          livenessProbe:
            httpGet: { path: /actuator/health/liveness,  port: 8082 }
            initialDelaySeconds: 45
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8082 }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: "300m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }

---
apiVersion: v1
kind: Service
metadata:
  name: event-processor-service
  namespace: event-platform
spec:
  selector:
    app: event-processor
  ports:
    - port: 80
      targetPort: 8082
  type: ClusterIP

---
# ── event-consumer Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-consumer
  namespace: event-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app: event-consumer
  template:
    metadata:
      labels:
        app: event-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/actuator/prometheus"
        prometheus.io/port:   "8083"
    spec:
      containers:
        - name: event-consumer
          image: YOUR_ECR/event-consumer:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: event-platform-config
          livenessProbe:
            httpGet: { path: /actuator/health/liveness,  port: 8083 }
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests: { cpu: "200m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }

---
apiVersion: v1
kind: Service
metadata:
  name: event-consumer-service
  namespace: event-platform
spec:
  selector:
    app: event-consumer
  ports:
    - port: 80
      targetPort: 8083
  type: ClusterIP

---
# ── HPA for event-producer ────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: event-producer-hpa
  namespace: event-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       event-producer
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
