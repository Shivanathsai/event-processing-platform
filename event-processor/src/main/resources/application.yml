spring:
  application:
    name: event-processor
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: event-processor
      properties:
        spring.json.add.type.headers: false

server:
  port: 8082

processor:
  window:
    duration-seconds: ${WINDOW_DURATION_SECONDS:60}
  alert:
    threshold: ${ALERT_THRESHOLD:100}
  application-id: ${KAFKA_STREAMS_APP_ID:event-processor}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.eventplatform: INFO
    org.apache.kafka.streams: WARN
