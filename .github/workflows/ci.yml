name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: "21"

jobs:

  build-and-test:
    name: Build & unit tests (Maven + TopologyTestDriver)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build all modules
        run: mvn clean compile -q

      - name: Run unit tests
        run: |
          mvn test \
            -pl event-common,event-processor,event-consumer \
            --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports/*.xml"

  integration-test:
    name: Integration test (services start and are healthy)
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR artifacts
        run: mvn clean package -DskipTests -q

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for Kafka
        run: |
          echo "Waiting for Kafka..."
          timeout 90 bash -c \
            'until docker exec kafka kafka-broker-api-versions \
               --bootstrap-server localhost:9092 >/dev/null 2>&1; \
             do echo "."; sleep 3; done'
          echo "Kafka ready ✓"

      - name: Wait for all services healthy
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:8081/api/v1/events/health && \
                   curl -sf http://localhost:8082/actuator/health && \
                   curl -sf http://localhost:8083/api/v1/health; \
             do echo "Waiting for services..."; sleep 5; done'
          echo "All services healthy ✓"

      - name: Verify Kafka topics created
        run: |
          sleep 10
          docker exec kafka kafka-topics \
            --bootstrap-server localhost:9092 --list
          echo "Kafka topics verified ✓"

      - name: Verify Prometheus metrics exposed
        run: |
          curl -sf http://localhost:8081/actuator/prometheus | grep -q "jvm_memory" \
            && echo "Producer metrics ✓"
          curl -sf http://localhost:8082/actuator/prometheus | grep -q "jvm_memory" \
            && echo "Processor metrics ✓"
          curl -sf http://localhost:8083/actuator/prometheus | grep -q "jvm_memory" \
            && echo "Consumer metrics ✓"

      - name: Verify consumer API
        run: |
          curl -sf http://localhost:8083/api/v1/stats
          echo "Consumer API ✓"

      - name: Print service logs on failure
        if: failure()
        run: |
          docker compose logs event-producer  | tail -30
          docker compose logs event-processor | tail -30
          docker compose logs event-consumer  | tail -30

      - name: Tear down
        if: always()
        run: docker compose down